<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Captcha Solver</title><link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"></head><body class="bg-gray-100 flex items-center justify-center min-h-screen p-4"><div class="bg-white p-6 rounded-lg shadow-lg max-w-md w-full text-center"><h1 class="text-3xl font-bold mb-6 text-gray-800">Solve the Captcha</h1><div class="mb-6 border border-gray-300 p-4 rounded-md bg-gray-50 flex justify-center"><img id="captchaImage" src="sample.png" alt="Captcha Image" class="max-w-full h-auto"></div><div class="mb-4"><label for="captchaInput" class="sr-only">Enter Captcha</label><input type="text" id="captchaInput" placeholder="Enter the text above" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"></div><button id="submitButton" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 text-lg font-medium">Submit</button><p id="message" class="mt-4 text-sm text-gray-600"></p></div><script>document.addEventListener('DOMContentLoaded', () => {const captchaImage = document.getElementById('captchaImage');const captchaInput = document.getElementById('captchaInput');const submitButton = document.getElementById('submitButton');const messageElement = document.getElementById('message');function getUrlParameter(name) {name = name.replace(/[[\]/, '\\[').replace(/[[\]/, '\\]');const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');const results = regex.exec(location.search);return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));}const imageUrl = getUrlParameter('url');if (imageUrl) {captchaImage.src = imageUrl;} else {captchaImage.src = 'sample.png';}submitButton.addEventListener('click', () => {const enteredText = captchaInput.value.trim();if (enteredText) {messageElement.textContent = `Submitted: "${enteredText}". (In a real application, this would be validated server-side.)`;messageElement.className = 'mt-4 text-sm text-green-600';if (imageUrl === '' && enteredText.toUpperCase() === 'ADCRB') {messageElement.textContent += ' (Correct for sample.png!)';messageElement.className = 'mt-4 text-sm text-green-700 font-bold';} else if (imageUrl === '' && enteredText.toUpperCase() !== 'ADCRB') {messageElement.textContent += ' (Incorrect for sample.png, try "ADCRB"!)';messageElement.className = 'mt-4 text-sm text-red-600';}} else {messageElement.textContent = 'Please enter the captcha text.';messageElement.className = 'mt-4 text-sm text-red-500';}});captchaInput.addEventListener('keypress', (e) => {if (e.key === 'Enter') {submitButton.click();}});});</script></body></html>
